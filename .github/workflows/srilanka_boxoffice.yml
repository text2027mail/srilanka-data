name: Sri Lanka Boxoffice Hourly

on:
  schedule:
    # Runs every hour at minute 0
    - cron: '0 * * * *'
  workflow_dispatch:   # allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install curl_cffi cloudscraper requests

      - name: Run Sri Lanka box office scraper
        env:
          CF_CLEARANCE: ${{ secrets.CF_CLEARANCE }}
          CF_BM: ${{ secrets.CF_BM }}
        run: |
          python srilanka_boxoffice.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add srilanka/
          git diff --staged --quiet || git commit -m "Auto-update Sri Lanka boxoffice data"
          git push
