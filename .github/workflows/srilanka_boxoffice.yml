name: Sri Lanka Boxoffice Tracker

on:
  schedule:
    # Run daily at 08:30 IST (03:00 UTC) – adjust as needed
    - cron: '30 3 * * *'
  workflow_dispatch:   # Allow manual trigger from Actions tab

jobs:
  track:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pytz requests
          playwright install chromium

      - name: Run Sri Lanka tracker
        run: python srilanka.py   # <-- Change to your script's filename

      - name: Upload results (optional)
        uses: actions/upload-artifact@v4
        with:
          name: srilanka-boxoffice-data
          path: srilanka/boxoffice/   # <-- Your output directory
