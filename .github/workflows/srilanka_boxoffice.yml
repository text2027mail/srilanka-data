name: Sri Lanka Box Office Update (Hourly)

on:
  schedule:
    - cron: '0 * * * *'       # every hour
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install required packages
          pip install curl_cffi cloudscraper playwright requests
          # Install Playwright's Chromium browser (needed for CF cookie refresh)
          playwright install chromium

      - name: Run Sri Lanka Box Office script
        env:
          CF_CLEARANCE: ${{ secrets.CF_CLEARANCE }}
          CF_BM: ${{ secrets.CF_BM }}
          # Optionally set a timezone (script uses IST internally)
          TZ: Asia/Kolkata
        run: python srilanka_boxoffice.py

      - name: Commit and push updated JSONs (with retry + force)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage only the srilanka directory (boxoffice + movie data)
          git add srilanka/

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update Sri Lanka boxoffice and movie data [skip ci]"

          MAX_RETRIES=3
          RETRY_COUNT=0
          until [ $RETRY_COUNT -ge $MAX_RETRIES ]; do
            echo "Push attempt $((RETRY_COUNT+1))/$MAX_RETRIES"
            git pull --rebase --quiet || true
            if git push --force-with-lease; then
              echo "Push succeeded!"
              exit 0
            fi
            RETRY_COUNT=$((RETRY_COUNT+1))
            sleep 5
          done

          echo "Push failed after $MAX_RETRIES attempts."
          exit 1
