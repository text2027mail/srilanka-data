name: Sri Lanka Box Office Update (Hourly)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install curl_cffi cloudscraper playwright requests
          playwright install chromium

      - name: Run Sri Lanka Box Office script
        env:
          CF_CLEARANCE: ${{ secrets.CF_CLEARANCE }}
          CF_BM: ${{ secrets.CF_BM }}
          TZ: Asia/Kolkata
        run: python srilanka.py

      - name: Commit and push updated JSONs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add srilanka/
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update Sri Lanka boxoffice and movie data [skip ci]"
          git pull --rebase --quiet || true
          git push --force-with-lease
