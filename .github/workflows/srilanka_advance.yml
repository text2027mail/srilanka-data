name: Sri Lanka Advance Bookings Update

on:
  schedule:
    # Runs at 10:00, 16:00, 20:00, 23:00 IST daily
    # UTC times: 04:30, 10:30, 14:30, 17:30
    - cron: '30 4,10,14,17 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install curl_cffi cloudscraper requests

      - name: Run Sri Lanka Advance script
        env:
          CF_CLEARANCE: ${{ secrets.CF_CLEARANCE }}
          CF_BM: ${{ secrets.CF_BM }}
        run: python srilanka_advance.py

      - name: Commit and push updated JSONs (with retry + force)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add srilanka/advance/

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update Sri Lanka advance bookings data [skip ci]"

          MAX_RETRIES=3
          RETRY_COUNT=0
          until [ $RETRY_COUNT -ge $MAX_RETRIES ]; do
            echo "Push attempt $((RETRY_COUNT+1))/$MAX_RETRIES"
            git pull --rebase --quiet || true
            if git push --force-with-lease; then
              echo "Push succeeded!"
              exit 0
            fi
            RETRY_COUNT=$((RETRY_COUNT+1))
            sleep 5
          done

          echo "Push failed after $MAX_RETRIES attempts."
          exit 1
